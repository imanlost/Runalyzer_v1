name: Build RunAlyzer Deb

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux-deb:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend (Vite)
        run: npm run build

      - name: Verify Frontend
        run: |
          ls -la dist/
          echo "--- Checking for intervals code ---"
          grep -c "intervals.icu" dist/assets/*.js || echo "INTERVALS CODE NOT FOUND IN JS BUNDLE!"
          grep -c "API_KEY" dist/assets/*.js || echo "API_KEY NOT FOUND!"
          grep -c "oldest=0" dist/assets/*.js || echo "oldest=0 NOT FOUND!"

      - name: Build Deb (Tauri)
        run: npm run tauri build

      - name: Verify Binary
        run: |
          echo "--- Checking binary for intervals code ---"
          grep -c "intervals.icu" src-tauri/target/release/bundle/deb/*.deb 2>/dev/null || echo "Not in .deb (expected - it's compressed)"
          strings src-tauri/target/release/runalyzer | grep -c "intervals.icu" || echo "INTERVALS NOT IN BINARY!"
          strings src-tauri/target/release/runalyzer | grep -c "API_KEY" || echo "API_KEY NOT IN BINARY!"
          strings src-tauri/target/release/runalyzer | grep -c "oldest=0" || echo "oldest=0 NOT IN BINARY!"

      - name: Upload Deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: runalyzer-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload Deb To Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/deb/*.deb
          overwrite_files: true
